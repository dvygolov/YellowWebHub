name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.js"
      - "*.mjs"
      - "functions/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: yellowweb
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - id: build
        run: |
          BUILD_VERSION=$(node -p 'require("./package.json").version')
          echo "version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
      - name: Commit release artifacts
        env:
          BUILD_VERSION: ${{ steps.build.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No release changes to commit."
          else
            git commit -m "chore: release ${BUILD_VERSION} [skip ci]"
            git push origin HEAD:main
          fi
      - run: npx wrangler pages deploy ./dist --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main --commit-dirty=true
